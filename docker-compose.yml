# Local Postgres for development. Credentials match the defaults in
# .env.example / .env:
#   postgresql://postgres:local@localhost:5432/shift_scheduler
#
# Usage:
#   docker compose up -d db      # start
#   docker compose down          # stop (keeps data)
#   docker compose down -v       # stop and wipe the volume
services:
  db:
    image: postgres:16
    container_name: shift-scheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local
      POSTGRES_DB: shift_scheduler
    ports:
      - "5432:5432"
    volumes:
      - shift_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shift_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shift_pgdata:
